<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>極智象棋 MVP Demo</title>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:#fff;margin:0}
header{background:#1e3a8a;padding:12px;text-align:center}
.container{display:grid;grid-template-columns:220px 1fr 280px;gap:12px;padding:12px}
.panel{background:#1e293b;border-radius:10px;padding:12px}
.board{display:grid;grid-template-columns:repeat(8,60px);gap:4px;justify-content:center}
.cell{width:60px;height:60px;background:#334155;border:1px solid #64748b;
display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer}
.turn{font-size:22px;font-weight:bold}
.btn{display:block;width:100%;margin:6px 0;padding:10px;border:none;border-radius:6px;cursor:pointer}
.green{background:#16a34a;color:white}
.blue{background:#2563eb;color:white}
.orange{background:#ea580c;color:white}
.log{height:260px;overflow:auto;background:#111827;padding:8px}
#tutorial{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center}
.card{background:white;color:black;padding:20px;border-radius:10px;max-width:500px}
</style>
</head>
<body>
<header><h1>極智象棋 MVP Demo</h1></header>

<div class="container">
<div class="panel">
<h3>玩家資訊</h3>
<p>玩家：玩家A</p>
<p>等級：Lv10</p>
<p>ELO：1200</p>

<button class="btn blue" onclick="setMode('一般象棋')">一般象棋</button>
<button class="btn blue" onclick="setMode('暗棋模式')">暗棋模式</button>
<button class="btn orange" onclick="aiSuggest()">AI建議</button>
<button class="btn green" onclick="aiAuto()">AI代打</button>
</div>

<div class="panel">
<h2 id="mode">一般象棋</h2>
<div class="turn" id="turn">🟢 玩家A回合</div>
<br>
<div class="board" id="board"></div>
</div>

<div class="panel">
<h3>棋譜紀錄</h3>
<div class="log" id="log"></div>
<hr>
<h3>統計資訊</h3>
<p>勝率：68%</p>
<p>平均耗時：2.5秒</p>
<p>總場數：120</p>
</div>
</div>

<div id="tutorial">
<div class="card">
<h2>歡迎來到極智象棋</h2>
<ol>
<li>點擊棋盤可模擬下棋。</li>
<li>可切換一般象棋/暗棋模式。</li>
<li>AI建議會推薦下一步。</li>
<li>AI代打會自動執行一步。</li>
<li>右側可查看棋譜紀錄。</li>
</ol>
<button onclick="document.getElementById('tutorial').style.display='none'">開始體驗</button>
</div>
</div>

<script>
const board=document.getElementById("board");
const log=document.getElementById("log");
let step=1;
const pieces=["車","馬","象","士","將","炮","卒"];

function drawBoard(dark=false){
 board.innerHTML="";
 for(let i=0;i<64;i++){
   const c=document.createElement("div");
   c.className="cell";
   c.textContent=dark?"?":(i<8?pieces[i%pieces.length]:"");
   c.onclick=()=>move(c,dark);
   board.appendChild(c);
 }
}

function move(cell,dark){
 if(dark && cell.textContent=="?"){
   cell.textContent=pieces[Math.floor(Math.random()*pieces.length)];
   addLog("翻牌："+cell.textContent);
 }else{
   addLog("Step "+step+"：模擬移動");
   step++;
 }
 toggleTurn();
}

function addLog(msg){
 log.innerHTML+=msg+"<br>";
 log.scrollTop=log.scrollHeight;
}

function toggleTurn(){
 const t=document.getElementById("turn");
 if(t.innerText.includes("玩家")){
   t.innerHTML="🔴 AI思考中...";
   setTimeout(()=>{t.innerHTML="🟢 玩家A回合";},1000);
 }
}

function aiSuggest(){
 const tips=["炮二平五","馬八進七","車一平二"];
 alert("AI建議："+tips[Math.floor(Math.random()*tips.length)]);
}

function aiAuto(){
 addLog("AI代打：炮二平五");
 toggleTurn();
}

function setMode(mode){
 document.getElementById("mode").innerText=mode;
 drawBoard(mode==="暗棋模式");
 addLog("切換模式："+mode);
}

drawBoard(false);
</script>
</body>
</html>
